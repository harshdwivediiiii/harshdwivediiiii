name: Update Trophies

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: ryo-ma/github-profile-trophy@v1
        with:
          github_user: harshdwivediiiii
          theme: tokyonight
          no-frame: true
          no-bg: true
          margin-w: 6
          column: 7
          output_dir: assets       # saves trophy.svg into /assets folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # needed to call GitHub API

      # Commits the generated SVG back into the repo
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update trophies [skip ci]"
          file_pattern: assets/trophy.svg
